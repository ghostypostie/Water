<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water</title>
  <link rel="stylesheet" href="splash.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
  <button id="close-btn" aria-label="Close" title="Close splash screen">&times;</button>
  <div id="app">
    <div class="sidebar">
      <div class="brand-logo">
        <img src="../imgs/logo.png" alt="Water Logo">
      </div>
      <div class="sidebar-title">PARTNERS</div>
      <ul class="partners">
        <li class="partner">
          <img src="../imgs/partner1.png" alt="PSVM">
          <div class="partner-meta">
            <span class="partner-name">PSVM</span>
            <a href="https://discord.gg/vNh35Wx6ua" class="btn btn-discord">Discord</a>
          </div>
        </li>
        <li class="partner">
          <img src="../imgs/partner2.png" alt="H1ND">
          <div class="partner-meta">
            <span class="partner-name">H1ND</span>
            <a href="https://discord.gg/GtE6MKSWvY" class="btn btn-discord">Discord</a>
          </div>
        </li>
      </ul>
      <div class="sidebar-version" id="version">Version 1.0.5</div>
    </div>

    <div class="hero">
      <h1>WATER</h1>
      <div class="update-status">
        <p id="message">Checking for updates…</p>
        <p id="details"></p>
      </div>
    </div>
  </div>
  <canvas></canvas>
</body>

</html>
